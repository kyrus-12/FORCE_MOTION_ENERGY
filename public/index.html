    <style>
        :root {

        }

            color: beige; 
            font-family: 'Segoe UI', sans-serif;

            display: flex; flex-direction: column; align-items: center;

        nav a { color: var(--text-color); margin: 0 15px; text-decoration: none; cursor: pointer; font-weight: bold; }

            width: 90vw; max-width: 1000px; padding: 40px; margin-bottom: 40px; 
            background: var(--glass-bg); backdrop-filter: blur(15px); 
            border-radius: 30px; border: var(--border); position: relative;
        }

            text-align: right; color: var(--text-color); margin-bottom: 20px; font-weight: bold; 
            border-bottom: var(--border); padding-bottom: 10px; display: flex; 
            justify-content: space-between; align-items: center; 
        }

        h1 { color: var(--text-color); font-size: 2.2rem; margin-top: 0; }
        
        /* Media Containers */
        .media-container { width: 100%; margin: 20px 0; border-radius: 15px; overflow: hidden; border: var(--border); }
        .media-container iframe { width: 100%; height: 400px; display: block; }
        .media-container img { width: 100%; height: auto; display: block; }
        
        .discussion-box { padding: 20px; margin-bottom: 20px; cursor: pointer;}

        /* References Styling */
        .references-page-box { padding: 20px; background: rgba(0,0,0,0.2); border-radius: 15px; border-left: 4px solid var(--text-color); }
        #ref-list { list-style: square; padding-left: 20px; color: #eee; line-height: 1.8; }

        button { padding: 15px; background: rgba(255, 255, 255, 0.1); color: white; border: var(--border); border-radius: 10px; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        button:hover:not(:disabled) { background: var(--text-color); color: #064e3b; }
        button:disabled { opacity: 0.6; cursor: not-allowed; border: 1px solid #555; }
        
        button.selected { border: 2px solid var(--highlight); background: rgba(250, 204, 21, 0.2); }
        
        .btn-trigger { width: 100%; background: #065f46; margin-top: 10px; }
        #questions-section { display: none; margin-top: 20px; }
        .question-block { margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        
        footer { margin-top: auto; padding: 20px; opacity: 0.8; text-align: center; border-top: var(--border); width: 100%; background: rgba(0,0,0,0.2); }
    
    /* Modal Styling */
.modal {
    display: none; 
    position: fixed; 
    z-index: 1000; 
    left: 0; top: 0;
    width: 100%; height: 100%; 
    background-color: rgba(0,0,0,0.8); /* Darken background */
    backdrop-filter: blur(5px);
}

.modal-content {
    background-color: #064e3b;
    margin: 5% auto;
    padding: 20px;
    border: var(--border);
    width: 80%;
    max-height: 80vh;
    overflow-y: auto; /* Scroll if many questions */
    border-radius: 20px;
}

.close-modal {
    color: var(--text-color);
    float: right;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
}
    
    .media-container div {
    border-top: var(--border);
    letter-spacing: 1px;
    font-weight: 500;
}
    
    
    /* Music Control Button */
.music-btn {
    background: #5d4037; /* Warm medium brown */
    color: var(--text-color);
    border: var(--border);
    border-radius: 30%;
    width: 60px;
    height: 36px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1.1rem;
    transition: all 0.3s ease;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

.music-btn:hover {
    background: #d7ccc8;
    color: #3e2723;
}

/* Hidden YouTube Player Container */
#yt-background-player {
    display: none;
}

        // --- TTS and Tap Logic ---
        
        function stripHtml(html) {
            // Replaces HTML tags with a space so the TTS doesn't read "br" etc.
            return html.replace(/<[^>]*>/g, ' ');
        }

        function playSpeech(text) {
    // If already speaking, clicking again stops the voice and resumes music
    if (window.speechSynthesis.speaking) {
        window.speechSynthesis.cancel();
        
        if (userWantsMusic && ytPlayer) {
            ytPlayer.playVideo();
        }
        return;
    }

    // Apply cleaning: Remove HTML tags and bracketed content, then normalize spaces
    const cleanText = stripHtml(text)
        .replace(/\[.*?\]/g, '') // Removes bracketed text like [Image description]
        .replace(/\s+/g, ' ')    // Removes extra whitespace/newlines
        .trim();

    // Prevent errors if the cleaned text is empty
    if (!cleanText) return;

    const utterance = new SpeechSynthesisUtterance(cleanText);
    
    // Pause background music while the voice reads
    if (ytPlayer) {
        ytPlayer.pauseVideo();
    }

    // Resume background music when speech finishes
    utterance.onend = function() {
        if (userWantsMusic && ytPlayer) {
            ytPlayer.playVideo();
        }
    };

    // Resume background music if speech fails
    utterance.onerror = function() {
        if (userWantsMusic && ytPlayer) {
            ytPlayer.playVideo();
        }
    };

    window.speechSynthesis.speak(utterance);
}
        function handleTap(text) {
            tapCount++;
            if (tapCount === 1) {
                tapTimer = setTimeout(() => {
                    // Single Tap: Pause/Resume
                    if (window.speechSynthesis.paused) {
                        window.speechSynthesis.resume();
                    } else if (window.speechSynthesis.speaking) {
                        window.speechSynthesis.pause();
                    }
                    tapCount = 0;
                }, 300);
            } else {
                // Double Tap: Restart
                clearTimeout(tapTimer);
                window.speechSynthesis.cancel();
                playSpeech(text);
                tapCount = 0;
            }
        }

let currentTrackIndex = 0;
let userWantsMusic = false; // Tracks if the user toggled music "On"

// Load the YouTube IFrame Player API asynchronously
(function() {
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
})();

// This function is automatically called by the YT API when ready
function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('yt-background-player', {
        height: '0',
        width: '0',
        videoId: musicPlaylist[currentTrackIndex],
        events: {
            'onReady': onPlayerReady,
            'onStateChange': onPlayerStateChange
        }
    });
}

function onPlayerReady(event) {
    // Player is loaded and ready.
}

// Automatically loops/plays the next track when the current one ends
function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) {
        currentTrackIndex = (currentTrackIndex + 1) % musicPlaylist.length;
        ytPlayer.loadVideoById(musicPlaylist[currentTrackIndex]);
    }
}

// Toggle play/pause music manually via the button
function toggleBackgroundMusic() {
    if (!ytPlayer) return;
    
    const btn = document.getElementById('music-toggle-btn');
    
    if (userWantsMusic) {
        // Pause the music
        ytPlayer.pauseVideo();
        userWantsMusic = false;
        if (btn) btn.innerHTML = 'PLAY'; // Play icon indicator
    } else {
        // Start playing
        ytPlayer.playVideo();
        userWantsMusic = true;
        if (btn) btn.innerHTML = 'PAUSE'; // Pause icon indicator
    }
}
